<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTM - Tournament Controller</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 15px; }
        .header { background-color: #1e1e1e; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; border-radius: 10px; border-bottom: 4px solid #007bff; margin-bottom: 20px; }
        .header span { color: #ffca28; }
        .card { background-color: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-top: 2px solid #333; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; color: #ffca28; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        .btn-primary { background: #007bff; color: white; border: none; padding: 10px; border-radius: 6px; width: 100%; font-weight: bold; margin-bottom: 10px; cursor: pointer;}
        .btn-warning { background: #ffca28; color: black; border: none; padding: 10px; border-radius: 6px; width: 100%; font-weight: bold; margin-bottom: 10px; cursor: pointer;}
        
        .court-item { background: #2a2a2a; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #28a745; display: flex; justify-content: space-between; align-items: center; }
        .court-item.busy { border-left-color: #dc3545; }
        .match-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #007bff; display: flex; justify-content: space-between; align-items: center; }
        
        .result-item { padding: 10px; border-bottom: 1px solid #333; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">🏸 BTM <span>Controller</span></div>

    <div class="card" id="nav-buttons" style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="btn-warning" style="flex: 1;" onclick="location.href='/setup'">⚙️ 1. CSV Setup</button>
        <button class="btn-primary" style="flex: 1; background: #17a2b8;" onclick="location.href='/seeding'">🏅 2. Seeding</button>
        <button class="btn-primary" style="flex: 1;" onclick="location.href='/draws'">🔀 3. Draws</button>
    </div>

    <div class="card">
        <div class="card-title">स्टेडियम 🏟️ Live Courts</div>
        <div id="active-matches-container">
            <p style="color:#666">Loading courts...</p>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📋 Match Queue (Pending)</div>
        <div id="pending-matches-container">
            <p style="color:#666">Queue empty.</p>
        </div>
    </div>

    <div class="card" style="border-top: 4px solid #28a745;">
    <div class="card-title">🏆 Recent Results</div>
    <div id="results-container" style="max-height: 250px; overflow-y: auto;">
        <p style="color:#666">Waiting for results...</p>
    </div>
    
    <button onclick="window.location.href='/rankings'" style="background:#28a745; color:white; border:none; padding:10px; width:100%; border-radius:6px; font-weight:bold; margin-top:10px; cursor:pointer;">📊 View Rankings</button>
    <button onclick="window.open('/report', '_blank')" style="background:#dc3545; color:white; border:none; padding:10px; width:100%; border-radius:6px; font-weight:bold; margin-top:10px; cursor:pointer;">📄 Generate PDF Report</button>
    <button onclick="window.location.href='/bracket'" style="background:#17a2b8; color:white; border:none; padding:10px; width:100%; border-radius:6px; font-weight:bold; margin-top:10px; cursor:pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">🌳 View Tournament Bracket (Tree)</button>
</div>


    <script>
        function loadAdminData() {
            // "?v=" add kiya hai taaki browser hamesha fresh data laaye (No Cache Issue)
            fetch('/api/admin_data?v=' + new Date().getTime())
            .then(r => r.json())
            .then(data => {
                
                // 1. Navigation Lock
                let navCard = document.getElementById('nav-buttons');
                if (navCard && data.pending && data.pending.length > 0) {
                    navCard.innerHTML = `
                        <button class="btn-warning" style="flex:1; opacity:0.5;" disabled>⚙️ 1. CSV Setup (Locked)</button>
                        <button class="btn-primary" style="flex:1; background:#17a2b8; opacity:0.5;" disabled>🏅 2. Seeding (Locked)</button>
                        <button class="btn-primary" style="flex:1; background:#6c757d;" onclick="location.href='/draws'">📊 View Draws</button>
                    `;
                }

                // 2. Active Courts
                let activeDiv = document.getElementById('active-matches-container');
                let activeHtml = '';
                if(data.active && data.active.length > 0) {
                    data.active.forEach(m => {
                        activeHtml += `<div class="court-item busy">
                            <div><strong style="color:#ffca28">Court ${m.court}</strong> - ${m.category} <br>
                            ${m.p1} <b>(${m.s1})</b> vs ${m.p2} <b>(${m.s2})</b></div>
                            <button class="btn-warning" style="width:auto; padding:8px 15px; margin:0;" onclick="window.open('/court/${m.court}', '_blank')">Umpire Panel</button>
                        </div>`;
                    });
                } else {
                    activeHtml = '<p style="color:#666">No live matches right now.</p>';
                }
                activeDiv.innerHTML = activeHtml;

                // 3. Pending Queue
                let pendingDiv = document.getElementById('pending-matches-container');
                let pendingHtml = '';
                if(data.pending && data.pending.length > 0) {
                    data.pending.forEach(m => {
                        let actionBtn = "";
                        let holdBtn = "";
                        
                        if(m.status === 'Hold') {
                            actionBtn = `<button class="btn-warning" style="width:auto; padding:5px 10px; margin:0;" onclick="toggleHold(${m.id})">Resume</button>`;
                        } else if(m.is_ready && !m.is_locked) {
                            actionBtn = `<button class="btn-primary" style="width:auto; padding:5px 10px; margin:0; background:#28a745;" onclick="assignCourt(${m.id})">Assign Court</button>`;
                        } else {
                            let lockText = m.is_locked ? ('🔒 ' + m.lock_reason) : '⏳ Resting';
                            actionBtn = `<span style="color:#dc3545; font-size:12px;"><b>${lockText}</b></span>`;
                        }

                        let lockString = m.lock_reason || "";
                        if(m.status !== 'Hold' && (!m.is_locked || lockString.includes('Resting'))) {
                            holdBtn = `<button class="btn-warning" style="width:auto; padding:5px 10px; margin:0; background:#dc3545; color:white; border:none;" onclick="toggleHold(${m.id})">Hold</button>`;
                        }

                        let borderStyle = m.status === 'Hold' ? 'border-left-color:#ffca28; opacity:0.7;' : '';
                        
                        pendingHtml += `<div class="match-item" style="${borderStyle}">
                            <div><small style="color:#17a2b8;">${m.category}</small><br>${m.p1} <b>vs</b> ${m.p2}</div>
                            <div style="display:flex; gap:5px; align-items:center;">${holdBtn} ${actionBtn}</div>
                        </div>`;
                    });
                } else {
                    pendingHtml = '<p style="color:#666">Queue is empty.</p>';
                }
                pendingDiv.innerHTML = pendingHtml;
            }).catch(err => console.error("Admin Error:", err));

            // 4. Results
            fetch('/api/get_results?v=' + new Date().getTime())
            .then(r=>r.json()).then(resData => {
                let resDiv = document.getElementById('results-container');
                let resHtml = '';
                if (resData && resData.length > 0) {
                    resData.forEach(r => {
                        resHtml += `<div style="padding:10px; border-bottom:1px solid #333;"><strong>${r.category}</strong>: ${r.winner_name} def. ${r.loser_name} <br><small style="color:#aaa;">Score: ${r.full_score}</small></div>`;
                    });
                } else {
                    resHtml = '<div style="padding:10px; color:#aaa;">No completed matches yet.</div>';
                }
                resDiv.innerHTML = resHtml;
            }).catch(e => console.log(e));
        }

        // Functions
        function toggleHold(matchId) { fetch(`/api/toggle_hold/${matchId}`, { method: 'POST' }).then(r=>r.json()).then(d=>{if(d.success)loadAdminData();}); }
        function assignCourt(matchId) {
            let court = prompt("Enter Court Number (e.g., 1, 2, 3):");
            if (court) {
                fetch(`/api/assign_court/${matchId}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({court_number:parseInt(court)}) })
                .then(r=>r.json()).then(d=>{ if(d.success) loadAdminData(); else alert(d.error); });
            }
        }

        // Auto Run
        loadAdminData();
        setInterval(loadAdminData, 3000);
    </script>
</body>
</html>
