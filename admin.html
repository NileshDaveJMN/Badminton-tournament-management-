<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTM - Tournament Controller</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 15px; }
        .header { background-color: #1e1e1e; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; border-radius: 10px; border-bottom: 4px solid #007bff; margin-bottom: 20px; }
        .header span { color: #ffca28; }
        .card { background-color: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-top: 2px solid #333; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; color: #ffca28; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        .btn-primary { background: #007bff; color: white; border: none; padding: 10px; border-radius: 6px; width: 100%; font-weight: bold; margin-bottom: 10px; cursor: pointer;}
        .btn-warning { background: #ffca28; color: black; border: none; padding: 10px; border-radius: 6px; width: 100%; font-weight: bold; margin-bottom: 10px; cursor: pointer;}
        
        .court-item { background: #2a2a2a; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #28a745; display: flex; justify-content: space-between; align-items: center; }
        .court-item.busy { border-left-color: #dc3545; }
        .match-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #007bff; display: flex; justify-content: space-between; align-items: center; }
        
        .result-item { padding: 10px; border-bottom: 1px solid #333; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">🏸 BTM <span>Controller</span></div>

    <div class="card">
        <button class="btn-warning" onclick="location.href='/setup'">⚙️ Go to Setup / CSV</button>
        <button class="btn-primary" onclick="location.href='/draws'">🔀 Go to Draw Engine</button>
    </div>

    <div class="card">
        <div class="card-title">स्टेडियम 🏟️ Live Courts</div>
        <div id="active-matches-container">
            <p style="color:#666">Loading courts...</p>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📋 Match Queue (Pending)</div>
        <div id="pending-matches-container">
            <p style="color:#666">Queue empty.</p>
        </div>
    </div>

    <div class="card" style="border-top: 4px solid #28a745;">
        <div class="card-title">🏆 Recent Results</div>
        <div id="results-container" style="max-height: 250px; overflow-y: auto;">
            <p style="color:#666">Waiting for results...</p>
        </div>
    </div>
    <script>
        function loadAdminData() {
            fetch('/api/admin_data')
                .then(r => r.json())
                .then(data => {
                    
                    try {
                        const activeDiv = document.getElementById('active-matches-container');
                        if (activeDiv && data.active) {
                            activeDiv.innerHTML = '';
                            if (data.active.length > 0) {
                                data.active.forEach(m => {
                                    activeDiv.innerHTML += `
                                        <div style="background:#2a2a2a; padding:15px; margin-bottom:10px; border-left:4px solid #dc3545; border-radius:5px;">
                                            <strong>Court ${m.court}</strong> <span style="color:#aaa; font-size:12px;">(${m.category})</span><br>
                                            <span style="font-size:16px;">${m.p1} 🆚 ${m.p2}</span>
                                            <div style="color:#28a745; font-weight:bold; margin-top:5px;">Score: ${m.s1} - ${m.s2}</div>
                                        </div>`;
                                });
                            } else {
                                activeDiv.innerHTML = '<div style="padding:10px; color:#aaa;">No live matches right now.</div>';
                            }
                        }
                    } catch(e) { console.log("Live Error:", e); }

                    try {
                        const pendingDiv = document.getElementById('pending-matches-container');
                        if (pendingDiv && data.pending) {
                            pendingDiv.innerHTML = '';
                            if (data.pending.length > 0) {
                                data.pending.forEach(m => {
                                    
                                    let readyBadge = "";
                                    let actionBtns = "";

                                    // 🚀 SMART UI: बैकएंड से लॉक का रीज़न सीधा प्रिंट करो
                                    if (m.is_locked) {
                                        readyBadge = `<span style="color:#ffca28; font-size:12px; font-weight:bold;">${m.lock_reason}</span>`;
                                        actionBtns = `<button disabled style="background:#333; color:#aaa; padding:10px 15px; border-radius:5px; border:1px solid #555; font-weight:bold;">Match Locked 🔒</button>`;
                                    } else {
                                        readyBadge = m.is_ready ? `<span style="color:#28a745; font-size:12px; font-weight:bold;">● Ready</span>` : `<span style="color:#dc3545; font-size:12px; font-weight:bold;">● Resting</span>`;
                                        let hStyle = m.status === 'Hold' ? 'background:#ffca28; color:#000;' : 'background:#444; color:#fff;';
                                        let hText = m.status === 'Hold' ? '▶ Unhold' : '⏸ Hold';
                                        let aState = (m.status === 'Hold' || !m.is_ready) ? 'disabled style="opacity:0.3;"' : '';

                                        actionBtns = `
                                            <button onclick="toggleHold(${m.id})" style="${hStyle} padding:10px 15px; border:none; border-radius:5px; margin-right:5px; font-weight:bold; cursor:pointer;">${hText}</button>
                                            <button onclick="assignCourt(${m.id})" style="background:#007bff; color:#fff; padding:10px 15px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;" ${aState}>Assign Court</button>
                                        `;
                                    }

                                    let opacity = m.status === "Hold" ? "0.5" : "1";
                                    pendingDiv.innerHTML += `
                                        <div style="background:#1e1e1e; padding:15px; margin-bottom:10px; border-left:4px solid #007bff; border-radius:8px; opacity:${opacity}; display:flex; justify-content:space-between; align-items:center;">
                                            <div>
                                                <div style="font-size:12px; color:#aaa; margin-bottom:5px;">${m.category} &nbsp; ${readyBadge}</div>
                                                <div style="font-size:15px; font-weight:bold;">${m.p1} 🆚 ${m.p2}</div>
                                            </div>
                                            <div>${actionBtns}</div>
                                        </div>`;
                                });
                            } else {
                                pendingDiv.innerHTML = '<div style="padding:10px; color:#aaa;">Queue is empty.</div>';
                            }
                        }
                    } catch(e) { console.log("Pending Error:", e); }

                });

            fetch('/api/get_results').then(r=>r.json()).then(resData => {
                try {
                    const resDiv = document.getElementById('results-container');
                    if (resDiv && resData) {
                        resDiv.innerHTML = '';
                        if (resData.length > 0) {
                            resData.forEach(r => {
                                resDiv.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;"><strong>${r.category}</strong>: ${r.winner_name} def. ${r.loser_name} <br><small style="color:#aaa;">Score: ${r.full_score}</small></div>`;
                            });
                        } else {
                            resDiv.innerHTML = '<div style="padding:10px; color:#aaa;">No completed matches yet.</div>';
                        }
                    }
                } catch(e) { console.log("Results Error:", e); }
            });
        }

        function toggleHold(matchId) { fetch(`/api/toggle_hold/${matchId}`, { method: 'POST' }).then(res => res.json()).then(data => { if(data.success) loadAdminData(); }); }
        function assignCourt(matchId) {
            const court = prompt("Enter Court Number (e.g., 1, 2, 3):");
            if (court) {
                fetch(`/api/assign_court/${matchId}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ court_number: parseInt(court) })
                }).then(res => res.json()).then(data => { if (data.success) { loadAdminData(); } else { alert(data.error); } });
            }
        }

        window.onload = () => { loadAdminData(); setInterval(loadAdminData, 5000); };
    </script>





</body>
</html>
