<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament PDF Report</title>
    <style>
        /* PDF & Print Friendly CSS (White Background, Black Text) */
        body { font-family: Arial, sans-serif; background-color: #fff; color: #000; padding: 20px; }
        .header { text-align: center; border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 28px; text-transform: uppercase; }
        .header p { margin: 5px 0; font-size: 16px; color: #555; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #f2f2f2; font-weight: bold; text-transform: uppercase; }
        .winner { font-weight: bold; color: #000; }
        
        .no-print { text-align: center; margin-bottom: 20px; }
        .btn-print { background-color: #dc3545; color: white; border: none; padding: 12px 25px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        
        /* Jab PDF banega tab ye button hide ho jayega */
        @media print {
            .no-print { display: none !important; }
            body { padding: 0; }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <button class="btn-print" onclick="window.print()">📥 Download as PDF</button>
    </div>

    <div class="header">
        <h1>🏆 BTM Tournament Report</h1>
        <p>Official Match Results & Final Standings</p>
    </div>

    <table id="report-table">
        <thead>
            <tr>
                <th>Category</th>
                <th>Draw / Round</th>
                <th>Winner</th>
                <th>Runner-up / Loser</th>
                <th>Final Score</th>
            </tr>
        </thead>
        <tbody id="report-body">
            <tr><td colspan="5">Loading Data...</td></tr>
        </tbody>
    </table>

    <script>
        fetch('/api/get_all_results')
            .then(res => res.json())
            .then(data => {
                let tbody = document.getElementById('report-body');
                tbody.innerHTML = '';
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">No matches have been completed yet.</td></tr>';
                    return;
                }

                data.forEach(m => {
                    tbody.innerHTML += `
                        <tr>
                            <td><b>${m.category}</b></td>
                            <td>${m.draw} <br><small>(${m.round})</small></td>
                            <td class="winner">🥇 ${m.winner_name}</td>
                            <td>${m.loser_name}</td>
                            <td>${m.full_score}</td>
                        </tr>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('report-body').innerHTML = '<tr><td colspan="5" style="color:red;">Error loading data!</td></tr>';
            });
    </script>

</body>
</html>
